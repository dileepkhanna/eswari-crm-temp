    <!-- Safari: -webkit-fill-available fixes the 100vh toolbar issue -->
    <script>
      document.documentElement.style.setProperty('--app-height', window.innerHeight + 'px');
      window.addEventListener('resize', () => {
        document.documentElement.style.setProperty('--app-height', window.innerHeight + 'px');
      });
    </script>
