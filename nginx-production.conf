# ============================================================
# Nginx Production Config — eswariconnects.com
# Place this file at: /etc/nginx/sites-available/eswariconnects
# Then: sudo ln -s /etc/nginx/sites-available/eswariconnects /etc/nginx/sites-enabled/
# Then: sudo nginx -t && sudo systemctl reload nginx
#
# Assumes:
#   - Django/Daphne running on 127.0.0.1:8000
#   - Frontend static files served from /var/www/eswariconnects/html
#     (or adjust root path below)
#   - SSL managed by Certbot (run: sudo certbot --nginx -d eswariconnects.com)
# ============================================================

# Upstream for Django/Daphne (handles both HTTP and WebSocket)
upstream django_backend {
    server 127.0.0.1:8000;
    keepalive 32;
}

# ── HTTP → HTTPS redirect ──────────────────────────────────
server {
    listen 80;
    listen [::]:80;
    server_name eswariconnects.com www.eswariconnects.com;

    # Allow Certbot ACME challenges
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# ── HTTPS main server ──────────────────────────────────────
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name eswariconnects.com www.eswariconnects.com;

    # SSL certificates (managed by Certbot)
    ssl_certificate     /etc/letsencrypt/live/eswariconnects.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/eswariconnects.com/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;

    # Max upload size (for file imports)
    client_max_body_size 100M;

    # Gzip
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml image/svg+xml;

    # ── WebSocket — MUST come before the /api/ block ──────
    # This is the critical block that was missing.
    # Nginx must forward the Upgrade header to Daphne or WebSocket handshake fails (1006).
    location /ws/ {
        proxy_pass         http://django_backend;
        proxy_http_version 1.1;

        # Required WebSocket upgrade headers
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection "upgrade";

        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Timeouts — keep connection alive for long-running WS sessions
        proxy_read_timeout  86400s;
        proxy_send_timeout  86400s;
        proxy_connect_timeout 10s;
    }

    # ── Django API ─────────────────────────────────────────
    location /api/ {
        proxy_pass         http://django_backend;
        proxy_http_version 1.1;

        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection        "";

        proxy_read_timeout  60s;
        proxy_send_timeout  60s;
        proxy_connect_timeout 10s;

        # Buffer settings for API responses
        proxy_buffering    on;
        proxy_buffer_size  16k;
        proxy_buffers      4 32k;
    }

    # ── Django Admin ───────────────────────────────────────
    location /django-admin/ {
        proxy_pass         http://django_backend;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection        "";
    }

    # ── Django static files (admin, drf browsable api) ────
    location /static/ {
        alias /var/www/eswariconnects/backend/staticfiles/;
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # ── Django media files (uploads) ──────────────────────
    location /media/ {
        alias /var/www/eswariconnects/backend/media/;
        expires 7d;
        add_header Cache-Control "public";
        add_header Access-Control-Allow-Origin "*";
    }

    # ── React frontend (SPA) ───────────────────────────────
    root /var/www/eswariconnects/html;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    # Cache hashed JS/CSS/image assets forever (Vite adds content hash to filenames)
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot|webp|avif)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Never cache index.html (so new deployments are picked up immediately)
    location = /index.html {
        add_header Cache-Control "no-store, no-cache, must-revalidate";
    }
}
